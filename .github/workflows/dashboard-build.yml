name: dashboard-build

on:
  push:
    branches: [main]
    paths:
      - "services/dashboard/**"
      - "packages/common/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dashboard-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Ruff lint
        run: uv run ruff check services/dashboard packages/common

      - name: Ruff format
        run: uv run ruff format --check services/dashboard packages/common

      - name: ty type check
        run: uv run ty check services/dashboard packages/common

      - name: pytest
        run: uv run pytest -q services/dashboard

  build:
    name: build + push
    needs: test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    env:
      ECR_REPOSITORY: ${{ vars.ECR_REGISTRY }}/ai-dlc/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_IMAGE_PUBLISHER_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@1629cc33a9521f764a4704d4d0387513918873b9  # v2.1.4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: services/dashboard/Dockerfile
          platforms: linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=dashboard-arm64
          cache-to: type=gha,mode=max,scope=dashboard-arm64

      - name: Roll dashboard ECS service to the new image
        # ECS task definition references `:latest` (terraform-managed). After
        # a fresh push, force a new deployment so ECS pulls the current
        # `:latest` digest and replaces tasks.
        run: |
          aws ecs update-service \
            --cluster ai-dlc-dev-dashboard \
            --service ai-dlc-dev-dashboard \
            --force-new-deployment \
            --no-cli-pager
          echo "::notice::Triggered rolling deploy on ai-dlc-dev-dashboard"
