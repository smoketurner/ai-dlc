name: aidlc-task-cleanup

# Sweeps orphaned per-task branches under aidlc/impl/{spec_slug}/{short_run_id}/{task_id}.
# A task branch is "orphaned" when its parent impl branch
# (aidlc/impl/{spec_slug}/{short_run_id}) no longer exists — the impl PR was
# merged (which auto-deletes the impl branch via the repo setting
# "Automatically delete head branches") or manually closed.
#
# Without this workflow task sub-branches accumulate over time.

on:
  schedule:
    # Daily at 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    name: prune orphan task branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Sweep orphan branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # Pull all branches matching aidlc/impl/* into a flat list.
          # GitHub's list-branches API caps at 100 per page; loop till short page.
          impl_branches=()
          page=1
          while :; do
            batch="$(gh api -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/branches?per_page=100&page=${page}" \
              --jq '.[].name' \
              | grep -E '^aidlc/impl/' || true)"
            if [[ -z "$batch" ]]; then
              break
            fi
            while IFS= read -r line; do
              impl_branches+=("$line")
            done <<< "$batch"
            count="$(printf '%s\n' "$batch" | wc -l | tr -d ' ')"
            if (( count < 100 )); then
              break
            fi
            page=$((page + 1))
          done

          # Build the set of impl branches (those without a fourth path segment).
          # aidlc/impl/{slug}/{short_run_id} has three slashes; task branches have four.
          declare -A live_parents=()
          for branch in "${impl_branches[@]}"; do
            segments="$(awk -F/ '{print NF}' <<< "$branch")"
            if [[ "$segments" -eq 4 ]]; then
              live_parents["$branch"]=1
            fi
          done

          # Walk task branches; delete any whose parent is missing.
          deleted=0
          for branch in "${impl_branches[@]}"; do
            segments="$(awk -F/ '{print NF}' <<< "$branch")"
            if [[ "$segments" -ne 5 ]]; then
              continue
            fi
            parent="${branch%/*}"
            if [[ -n "${live_parents[$parent]:-}" ]]; then
              continue
            fi
            echo "deleting orphan task branch: $branch"
            gh api -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/git/refs/heads/${branch}" || true
            deleted=$((deleted + 1))
          done
          echo "deleted ${deleted} orphan task branches"
