name: terraform-apply

# Apply infrastructure changes for the dev environment.
#
# AgentCore Runtime container images and the dashboard ECS image are rolled
# out-of-band by the images-build / dashboard-build workflows via
# update-agent-runtime / update-service — terraform never carries those
# image SHAs in state.
#
# Lambdas, however, ARE deployed by terraform via terraform-aws-modules/lambda/aws
# with ``source_path``: the module hashes the function source + requirements
# and rebuilds the zip on every plan, so any code change under
# ``lambdas/*/src`` or ``packages/common/src`` (a workspace dep many Lambdas
# bundle) requires a terraform-apply run. The path filter mirrors that.

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
      - "lambdas/*/src/**"
      - "lambdas/*/requirements.txt"
      - "lambdas/*/pyproject.toml"
      - "packages/common/src/**"
      - "packages/common/pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

jobs:
  apply:
    name: terraform apply (dev)
    if: github.repository_owner == 'smoketurner'
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache
      # Force the provider + backend to use OIDC env-var credentials, not the
      # local dev SSO profile that's the default.
      TF_VAR_aws_profile: ""
      # Team-shared config lives in ``terraform/envs/dev/dev.auto.tfvars``.
      # ``alert_emails`` is the one exception — kept in a repo variable
      # to keep personal addresses out of git. Format: JSON array
      # string, e.g. ``["alice@example.com"]``.
      TF_VAR_alert_emails: ${{ vars.AIDLC_ALERT_EMAILS }}
    defaults:
      run:
        working-directory: terraform/envs/dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TERRAFORM_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_wrapper: false

      - name: Create plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
        working-directory: .

      - name: Cache Terraform providers
        # Provider downloads (hashicorp/aws ~> 6.0 alone is ~120 MB) get
        # re-pulled on every cold run. Cache them keyed on the lockfile so
        # apply skips the download when nothing changed.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('terraform/envs/dev/.terraform.lock.hcl') }}
          restore-keys: |
            tf-providers-${{ runner.os }}-${{ runner.arch }}-

      - name: Pull SAM Lambda build image
        # The lambda module v8 calls `docker images` against this tag and
        # falls back to BUILDING the image (not pulling) when missing.
        # Pre-pulling avoids the build-fallback path entirely. Tag must
        # match the ``docker_image`` set in terraform/modules/pipeline/lambdas.tf.
        run: docker pull public.ecr.aws/sam/build-python3.14:latest-arm64
        working-directory: .

      - name: Terraform init
        # backend.tf is a partial config (no bucket, no profile). CI supplies
        # the bucket from a repo variable and leaves profile empty so the
        # S3 backend uses the OIDC-assumed env-var creds.
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="profile="

      - name: Terraform plan
        run: terraform plan -out=tfplan -no-color

      - name: Terraform apply
        run: terraform apply -auto-approve -no-color tfplan
