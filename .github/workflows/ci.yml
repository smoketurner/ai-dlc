name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check

      - name: pytest (unit)
        run: uv run pytest -q -m "not integration and not live_aws and not eval"

      - name: pip-audit
        run: uv run pip-audit --strict --disable-pip

  workflows:
    name: workflow security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: zizmor
        uses: zizmorcore/zizmor-action@2eaf42bcccfed62978cee0905902acbc294d5123  # v1.24.1
