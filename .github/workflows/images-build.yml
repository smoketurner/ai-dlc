name: images-build

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "packages/common/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/images-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: images-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.agent }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        agent: [architect, critic, implementer, reviewer, tester, proposer, triage]
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REGISTRY }}/ai-dlc/${{ matrix.agent }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_IMAGE_PUBLISHER_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7  # v2.1.4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Skip if agent dir missing
        id: check
        run: |
          if [ -d "agents/${AGENT}" ] && [ -f "agents/${AGENT}/Dockerfile" ]; then
            echo "build=true" >>"$GITHUB_OUTPUT"
          else
            echo "build=false" >>"$GITHUB_OUTPUT"
            echo "::notice::agents/${AGENT} not present yet — skipping"
          fi
        env:
          AGENT: ${{ matrix.agent }}

      - name: Build and push
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: agents/${{ matrix.agent }}/Dockerfile
          platforms: linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=${{ matrix.agent }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}-arm64

      - name: Roll AgentCore Runtime to the new image
        # AgentCore Runtime API names follow the terraform pattern
        # `ai_dlc_<env>_<agent>` (underscores). Fetch the current runtime
        # config, swap only the container URI for the new digest, and send
        # the whole shape back via update-agent-runtime so other fields
        # (role, network, env, etc.) remain unchanged.
        if: steps.check.outputs.build == 'true'
        env:
          AGENT: ${{ matrix.agent }}
        run: |
          set -euo pipefail
          runtime_name="ai_dlc_dev_${AGENT}"
          runtime_id=$(aws bedrock-agentcore-control list-agent-runtimes \
            --query "agentRuntimes[?agentRuntimeName=='${runtime_name}'].agentRuntimeId" \
            --output text)
          if [ -z "${runtime_id}" ] || [ "${runtime_id}" = "None" ]; then
            echo "::warning::AgentCore runtime ${runtime_name} not found — skip rollout (apply terraform first)"
            exit 0
          fi
          digest=$(aws ecr describe-images \
            --repository-name "ai-dlc/${AGENT}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          new_uri="${ECR_REPOSITORY}@${digest}"
          aws bedrock-agentcore-control get-agent-runtime \
            --agent-runtime-id "${runtime_id}" \
            > current.json
          # ``with_entries`` strips keys whose values are null. Specifically
          # needed for ``authorizerConfiguration``: the AWS CLI's
          # ``update-agent-runtime`` rejects ``null`` for that field (it
          # wants either a dict or no key at all). Runtimes configured
          # with IAM auth (no JWT authorizer) return ``null`` here.
          jq --arg uri "${new_uri}" '
            {
              agentRuntimeId,
              agentRuntimeArtifact: {
                containerConfiguration: { containerUri: $uri }
              },
              roleArn,
              networkConfiguration,
              protocolConfiguration,
              authorizerConfiguration,
              environmentVariables,
              description
            } | with_entries(select(.value != null))
          ' current.json > update.json
          aws bedrock-agentcore-control update-agent-runtime --cli-input-json file://update.json
          echo "::notice::Rolled ${runtime_name} to ${new_uri}"
