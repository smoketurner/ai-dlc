# Machine-readable index of the eval cases.
#
# The Markdown files in this directory remain the authoritative narrative
# (intent, setup, expected behaviour, pass criteria). This file is the
# subset the eval-runner Step Functions state machine reads at runtime —
# kept in sync by hand because the case set evolves slowly and a parser
# over the Markdown would be more work than maintaining 10 entries.
#
# Schema:
#   slug              — case slug (matches the .md filename and is the spec_slug)
#   project_slug      — the target project the architect/implementer build inside
#   intent            — the prompt submitted via /v1/runs
#   pass_criteria:
#     min_task_count        — fail if the spec produced fewer tasks than this
#     max_task_count        — fail if the spec produced more tasks than this
#     max_cost_usd          — fail if total cost exceeds this
#     max_duration_minutes  — fail if total wall-clock exceeds this
#     allow_rejections      — true if rejection-retry is part of the case
#                             (case 08, 09); false otherwise

cases:
  - slug: empty-repo-bootstrap
    project_slug: echo
    intent: |-
      Bootstrap a Python web service called "echo" with a single GET /healthz
      endpoint that returns {"ok": true, "build_sha": "<sha>"}. Use FastAPI,
      uv, ruff, ty, pytest. Pin every dependency to an exact version. Add a
      multi-stage Dockerfile for linux/arm64. Add a docs/MEMORY.md with the
      conventions section pre-filled.
    pass_criteria:
      min_task_count: 5
      max_task_count: 8
      max_cost_usd: 5.00
      max_duration_minutes: 60
      allow_rejections: false

  - slug: small-feature-add
    project_slug: echo
    intent: |-
      In the echo service, add a GET /version route that returns
      {"version": "<pyproject-version>", "commit": "<git-sha>"}. Update
      requirements.md for it, wire a unit test, and update the README.
    pass_criteria:
      min_task_count: 2
      max_task_count: 4
      max_cost_usd: 2.00
      max_duration_minutes: 30
      allow_rejections: false

  - slug: cross-cutting-feature
    project_slug: echo
    intent: |-
      Add structured-log JSON output to every route in the echo service.
      Use structlog, configure it once at startup, propagate a request id
      from x-request-id (generate one if absent), and add the request id
      to every log line for the request. Update docs/MEMORY.md to document
      the convention.
    pass_criteria:
      min_task_count: 3
      max_task_count: 6
      max_cost_usd: 4.00
      max_duration_minutes: 60
      allow_rejections: false

  - slug: bug-fix
    project_slug: echo
    intent: |-
      The /healthz route returns 500 when the BUILD_SHA env var is missing.
      It should return 200 with build_sha: null. Add a regression test that
      uses a clean env without BUILD_SHA set.
    pass_criteria:
      min_task_count: 1
      max_task_count: 2
      max_cost_usd: 1.50
      max_duration_minutes: 20
      allow_rejections: false

  - slug: refactor
    project_slug: echo
    intent: |-
      The echo service has accumulated direct os.environ[...] reads in five
      places. Refactor to a single Settings Pydantic model loaded once at
      startup. Don't change behaviour. Don't add new env vars. Existing
      tests must keep passing.
    pass_criteria:
      min_task_count: 3
      max_task_count: 6
      max_cost_usd: 5.00
      max_duration_minutes: 60
      allow_rejections: false

  - slug: dependency-upgrade
    project_slug: echo
    intent: |-
      Upgrade FastAPI from 0.110 to the latest stable release. Update
      pyproject.toml, regenerate uv.lock, fix any breaking changes that
      surface in tests, and document the upgrade in MEMORY.md Notes.
    pass_criteria:
      min_task_count: 1
      max_task_count: 5
      max_cost_usd: 3.00
      max_duration_minutes: 45
      allow_rejections: false

  - slug: memory-md-learning
    project_slug: echo
    intent: |-
      Add a POST /uppercase endpoint to the echo service that takes
      {"text": "..."} and returns {"result": "..."} uppercased.
    pass_criteria:
      min_task_count: 2
      max_task_count: 5
      max_cost_usd: 3.00
      max_duration_minutes: 45
      allow_rejections: false

  - slug: conflict-resolution
    project_slug: echo
    intent: |-
      Add a requestor_email field to the run-submission body. Validate it
      as an email address.
    pass_criteria:
      min_task_count: 1
      max_task_count: 4
      max_cost_usd: 4.00
      max_duration_minutes: 60
      allow_rejections: true

  - slug: hitl-reject-loop
    project_slug: echo
    intent: |-
      Add a GET /env route to the echo service that returns the names (not
      values) of every AIDLC_* env var present.
    pass_criteria:
      min_task_count: 1
      max_task_count: 4
      max_cost_usd: 4.00
      max_duration_minutes: 60
      allow_rejections: true

  - slug: long-session-resume
    project_slug: echo
    intent: |-
      Migrate the echo service from FastAPI's deprecated on_event("startup")
      decorator to the lifespan context-manager pattern. Touch every place
      that registers a startup or shutdown callback.
    pass_criteria:
      min_task_count: 5
      max_task_count: 12
      max_cost_usd: 6.00
      max_duration_minutes: 120
      allow_rejections: false
