[project]
name = "common"
version = "0.0.0"
description = "Shared models, hybrid memory, and AWS adapters for ai-dlc."
requires-python = ">=3.14,<3.15"
dependencies = [
    "bedrock-agentcore==1.9.0",
    "boto3==1.43.6",
    "botocore==1.43.6",
    "httpx==0.28.1",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.0",
    "pyjwt[crypto]==2.12.1",
    "pyyaml==6.0.3",
    "uuid-utils==0.14.1",
]

[build-system]
requires = ["uv_build>=0.11"]
build-backend = "uv_build"
