[project]
name = "common"
version = "0.0.0"
description = "Shared models, hybrid memory, telemetry, and AWS adapters for ai-dlc."
requires-python = ">=3.14,<3.15"
dependencies = [
    "aws-opentelemetry-distro==0.17.0",
    "bedrock-agentcore==1.8.0",
    "boto3==1.43.2",
    "botocore==1.43.2",
    "httpx==0.28.1",
    "mcp==1.27.0",
    "opentelemetry-api==1.40.0",
    "opentelemetry-sdk==1.40.0",
    "pydantic==2.13.3",
    "pydantic-settings==2.14.0",
    "structlog==25.5.0",
    "uuid-utils==0.14.1",
]

[build-system]
requires = ["uv_build>=0.11"]
build-backend = "uv_build"
